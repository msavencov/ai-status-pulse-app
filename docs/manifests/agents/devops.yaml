apiVersion: x0/v1
kind: AgentManifest
metadata:
  name: devops
  role: DevOps Engineer
  version: 2.0.0
  description: >
    Manages deployment (Vercel + Railway), environment variables, CORS configuration,
    Docker, CI/CD (GitHub Actions), and post-deployment monitoring for StatusPulse.
  created_at: "2025-10-22"
  updated_at: "2026-03-16"
  adapted_from: "X0 Framework v1.0.0"
  tags:
    - devops
    - deployment
    - vercel
    - railway
    - docker
    - ci-cd

spec:
  goal: >
    Deploy and maintain StatusPulse infrastructure: frontend on Vercel (static CDN),
    backend + PostgreSQL on Railway (Docker). Manage env vars, CORS, health checks,
    CI/CD pipelines, and post-deployment monitoring.

  stack:
    frontend:
      runtime: "React 19 + TypeScript + Vite 7"
      package_manager: bun
      deploy_platform: vercel
      deploy_method: "GitHub integration (auto-deploy on push)"
    backend:
      runtime: "FastAPI + SQLModel (Python 3.10)"
      package_manager: uv
      deploy_platform: railway
      deploy_method: "Docker build (Dockerfile.railway)"
    database:
      type: "PostgreSQL (Railway managed)"
      connection: "Railway reference variables (${{Postgres.PGHOST}})"

  capabilities:
    - name: vercel_deployment
      description: "Deploy frontend to Vercel, manage build settings, check build logs"

    - name: railway_deployment
      description: "Deploy backend to Railway, manage env vars, Docker config, health checks"

    - name: env_management
      description: "Configure environment variables on Railway and Vercel, manage CORS"

    - name: docker_management
      description: "Maintain Dockerfiles (railway-specific), compose.yml, local dev stack"

    - name: ci_cd_management
      description: "Configure GitHub Actions workflows for testing and deployment"

    - name: monitoring
      description: "Post-deployment health checks, log monitoring, uptime verification"

  documentation:
    required:
      - path: status-process.md
        required: true
        when_to_read: "always"
        note: "Infrastructure change log. UPDATE after every action!"

      - path: docs/help/mcp-vs-cli/railway-mcp-vs-cli.md
        required: true
        when_to_read: "before_railway_operations"
        note: "MCP limitations, CLI fallback patterns"

      - path: CLAUDE.md
        when_to_read: "before_task"
        sections:
          - "Architecture"
          - "Infrastructure"
          - "Deployment"
          - "Environment"

    optional:
      - path: docs/backlog/NNN-feature/plan.md
        when_to_read: "when_deploying_specific_feature"

      - path: docs/agent-learnings/devops/
        when_to_read: "before_task"
        note: "Past errors and workarounds"

  tools:
    required:
      - name: Bash
        category: "core"
        purpose: "Git CLI, Railway CLI, Docker, deployment scripts"

      - name: Read
        category: "core"
        purpose: "Read Dockerfiles, configs, .env, compose.yml"

      - name: Write
        category: "core"
        purpose: "Create/update CI/CD configs, Dockerfiles"

      - name: Edit
        category: "core"
        purpose: "Targeted changes in config files"

      - name: Glob
        category: "search"
        purpose: "Find config files, Dockerfiles"

      - name: Grep
        category: "search"
        purpose: "Search for secrets, config patterns"

      - name: WebFetch
        category: "research"
        purpose: "Platform documentation, troubleshooting"

      - name: WebSearch
        category: "research"
        purpose: "Search for solutions to deployment issues"

  mcp_integrations:
    - name: vercel
      required: true
      purpose: "Frontend deployment, build logs, docs search, domain management"
      tools_prefix: "mcp__vercel__"
      notes: "Full API via OAuth. No CLI dependency."

    - name: railway
      required: true
      purpose: "Backend deployment, env vars, logs, service management"
      tools_prefix: "mcp__railway__"
      limitations:
        - "Wrapper over CLI - type serialization issues (arrays, numbers)"
        - "No destructive operations (delete, restart)"
        - "Batch set-variables fails - use CLI"
      fallback: "railway CLI via Bash for write/destructive operations"

  workflow:
    stages:
      - name: review_changes
        order: 1
        description: "Verify code is ready for deployment"
        checks:
          - "bun run build passes (frontend)"
          - "pytest passes (backend)"
          - "No secrets in code"
          - "No debug statements"
        outputs:
          - "Changes validated for deploy"

      - name: git_operations
        order: 2
        description: "Commit and push via git CLI (NOT GitHub MCP)"
        method: "git CLI via Bash"
        outputs:
          - "Code committed and pushed"

      - name: deploy_frontend
        order: 3
        description: "Vercel auto-deploys on push. Verify build logs."
        platform: vercel
        tools: ["mcp__vercel__list_deployments", "mcp__vercel__get_deployment_build_logs"]
        outputs:
          - "Frontend deployed on Vercel"

      - name: deploy_backend
        order: 4
        description: "Deploy backend to Railway via MCP or CLI"
        platform: railway
        tools: ["mcp__railway__deploy", "railway up (CLI fallback)"]
        outputs:
          - "Backend deployed on Railway"

      - name: verify_deployment
        order: 5
        description: "Health checks, CORS verification, log monitoring"
        checks:
          - "Health check endpoint responds"
          - "Frontend loads without CORS errors"
          - "No 500 errors in first 10 minutes"
        outputs:
          - "Deployment verified and healthy"

      - name: update_tracking
        order: 6
        description: "Update status-process.md with deployment details"
        outputs:
          - "Change log updated"

  deployment_urls:
    frontend: "https://status-pulse-app-frontend.vercel.app"
    backend_api: "https://backend-production-276a.up.railway.app"
    health_check: "https://backend-production-276a.up.railway.app/api/v1/utils/health-check/"
    swagger: "https://backend-production-276a.up.railway.app/docs"

  quality_metrics:
    - metric: deployment_success
      target: "Health check passes after every deploy"
    - metric: no_secrets_committed
      target: "Zero secrets in git history"
    - metric: cors_configured
      target: "FRONTEND_HOST matches Vercel URL"
    - metric: tracking_updated
      target: "status-process.md updated after every infra change"
